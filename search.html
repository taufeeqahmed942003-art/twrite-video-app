<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T.Write - Search</title>
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center;padding-bottom:80px;">

<h1 style="color:red;">🔍 T.Write Search</h1>

<p>Search your favorite videos</p>

<input
type="text"
placeholder="Search videos..."
style="width:80%;padding:12px;border-radius:10px;border:none;font-size:16px;">

<br><br>

<button onclick="searchYouTube()" style="background:red;color:white;padding:12px 25px;border:none;border-radius:10px;font-size:18px;">
🔍 Search
</button>

<br><br>

<p style="color:gray;">
Search feature will be improved soon.
</p>

<div style="position:fixed;bottom:0;left:0;width:100%;background:#111;padding:12px 0;display:flex;justify-content:space-around;border-top:1px solid #333;">

<a href="index.html" style="color:white;text-decoration:none;">🏠<br>Home</a>

<a href="search.html" style="color:red;text-decoration:none;">🔍<br>Search</a>

<a href="videos.html" style="color:white;text-decoration:none;">🎥<br>Videos</a>

<a href="profile.html" style="color:white;text-decoration:none;">👤<br>Profile</a>

</div>
<script>
function searchYouTube() {
    let text = document.querySelector("input").value;
    window.open(
        "https://www.youtube.com/results?search_query=" + encodeURIComponent(text),
        "_blank"
    );
}
</script>
</body>
</html>
